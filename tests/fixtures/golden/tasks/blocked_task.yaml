id: b1-h1-api-design
title: RESTful API Design with Rate Limiting
module: b1
direction: backend
type: hypothesis
hypothesis: >
  A RESTful API with token-bucket rate limiting at 1000 req/min per user
  can maintain sub-50ms p99 response latency under sustained load,
  without degrading throughput for well-behaved clients.
null_hypothesis: >
  Token-bucket rate limiting introduces per-request overhead that pushes
  p99 latency above 50ms under load, or the 1000 req/min limit is too
  restrictive for legitimate power users, causing false-positive throttling.
